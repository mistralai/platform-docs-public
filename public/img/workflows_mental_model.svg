<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" role="img" aria-label="Two scopes connected by an outbound link. The Workflows API contains an Execution, which contains a history of Events. A Worker contains a Workflow, which contains Activity calls. Workers connect outbound to the API to pull work.">
  <defs>
    <style>
      .node { stroke-width: 1.5; }
      .node--card { fill: #f5f4f2; stroke: #d6d2cd; }
      .node--inner { fill: #ffffff; stroke: #d6d2cd; }
      .container { fill: #fafaf8; stroke: #d6d2cd; stroke-dasharray: 6 4; stroke-width: 1.5; }

      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #302e2b;
      }
      .title--accent { fill: #d35a20; }
      .card-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #302e2b;
        letter-spacing: 0.3px;
      }
      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #302e2b;
      }
      .ellipsis {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 26px;
        font-weight: 700;
        fill: #7a7a7a;
      }
      .sublabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        fill: #7a7a7a;
        font-style: italic;
      }

      .arrow {
        stroke: #b0aaa4;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrowHead { fill: #b0aaa4; }

      @media (prefers-color-scheme: dark) {
        .node--card { fill: #2d2d2d; stroke: #444; }
        .node--inner { fill: #1f1f1f; stroke: #444; }
        .container { fill: #232323; stroke: #444; }
        .title { fill: #f0f0f0; }
        .title--accent { fill: #e0631f; }
        .card-label { fill: #f0f0f0; }
        .label { fill: #f0f0f0; }
        .ellipsis { fill: #888; }
        .sublabel { fill: #999; }
        .arrow { stroke: #666; }
        .arrowHead { fill: #666; }
      }
    </style>

    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" class="arrowHead"/>
    </marker>
  </defs>

  <!-- ===== Top scope: Workflows API ===== -->
  <rect class="container" x="40" y="20" width="680" height="200" rx="16"/>
  <text class="title title--accent" x="380" y="55" text-anchor="middle">Workflows API</text>

  <!-- Execution card -->
  <rect class="node node--card" x="80" y="80" width="600" height="120" rx="12"/>
  <text class="card-label" x="100" y="108">EXECUTION</text>

  <!-- Events -->
  <rect class="node node--inner" x="200" y="130" width="160" height="50" rx="8"/>
  <text class="label" x="280" y="161" text-anchor="middle">Event</text>

  <rect class="node node--inner" x="380" y="130" width="160" height="50" rx="8"/>
  <text class="label" x="460" y="161" text-anchor="middle">Event</text>

  <text class="ellipsis" x="585" y="167" text-anchor="middle">…</text>

  <!-- ===== Connector (worker → API, outbound) ===== -->
  <path class="arrow" d="M 380 280 L 380 230" marker-end="url(#ah)"/>
  <text class="sublabel" x="395" y="259" text-anchor="start">workers connect outbound</text>

  <!-- ===== Bottom scope: Worker ===== -->
  <rect class="container" x="40" y="300" width="680" height="180" rx="16"/>
  <text class="title" x="380" y="335" text-anchor="middle">Worker</text>

  <!-- Workflow card -->
  <rect class="node node--card" x="80" y="360" width="600" height="100" rx="12"/>
  <text class="card-label" x="100" y="385">WORKFLOW</text>

  <!-- Activities -->
  <rect class="node node--inner" x="160" y="400" width="180" height="50" rx="8"/>
  <text class="label" x="250" y="431" text-anchor="middle">Activity</text>

  <rect class="node node--inner" x="360" y="400" width="180" height="50" rx="8"/>
  <text class="label" x="450" y="431" text-anchor="middle">Activity</text>

  <text class="ellipsis" x="585" y="437" text-anchor="middle">…</text>
</svg>
