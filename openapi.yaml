        description: The number of items to return per page.
        required: false
        schema:
          type: integer
          title: Page Size
          default: 100
      - name: model
        in: query
        description: The model name used for fine-tuning to filter on. When set, the other results are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
      - name: created_after
        in: query
        description: The date/time to filter on. When set, the results for previous creation times are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created After
      - name: created_before
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created Before
      - name: created_by_me
        in: query
        description: When set, only return results for jobs created by the API caller. Other results are not displayed.
        required: false
        schema:
          type: boolean
          title: Created By Me
          default: false
      - name: status
        in: query
        description: The current job state to filter on. When set, the other results are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
            enum:
            - QUEUED
            - STARTED
            - VALIDATING
            - VALIDATED
            - RUNNING
            - FAILED_VALIDATION
            - FAILED
            - SUCCESS
            - CANCELLED
            - CANCELLATION_REQUESTED
          - type: 'null'
          title: Status
      - name: wandb_project
        in: query
        description: The Weights and Biases project to filter on. When set, the other results are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Wandb Project
      - name: wandb_name
        in: query
        description: The Weight and Biases run name to filter on. When set, the other results are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Wandb Name
      - name: suffix
        in: query
        description: The model suffix to filter on. When set, the other results are not displayed.
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Suffix
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobsOut'
