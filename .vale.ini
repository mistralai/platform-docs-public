StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = Mistral

Packages = Microsoft

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale, Microsoft, Mistral

# Ignore MDX import/export lines and admonition directives
TokenIgnores = (^import\s.+$), (^export\s.+$), (^:::\w+), (^:::$)

# --- Disabled: conflict with Mistral style guide ---
# Mistral requires "we/our" — Microsoft flags first-person
Microsoft.We = NO
Microsoft.FirstPerson = NO
# Mistral uses contractions in prose
Microsoft.Contractions = NO
# Microsoft-specific terminology and vocabulary — conflicts with Mistral terms
Microsoft.Terms = NO
Microsoft.Vocab = NO

# --- Disabled: too noisy or not relevant ---
# US-style "punctuation inside quotes" — not a Mistral rule
Microsoft.Quotes = NO
# Flags semicolons everywhere including code-heavy prose
Microsoft.Semicolon = NO
# Flags non-English words (intentional French terms like "Plateforme")
Microsoft.Foreign = NO
# URL formatting opinions — not useful here
Microsoft.GeneralURL = NO

# --- Downgraded to suggestion: useful signal, but noisy at default level ---
Microsoft.Passive = suggestion
Microsoft.SentenceLength = suggestion
Microsoft.Wordiness = suggestion
Microsoft.Adverbs = suggestion
Microsoft.Acronyms = suggestion
Microsoft.HeadingAcronyms = suggestion

# --- Downgraded: Vale built-in rules ---
# Too noisy — flags code identifiers, variable names, French words
Vale.Spelling = warning
