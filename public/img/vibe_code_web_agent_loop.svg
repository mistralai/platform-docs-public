<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" role="img" aria-label="Vibe Code agent loop diagram. The agent reads files in scope, plans the next action, acts by editing code or running a command, reports back to the session activity stream, and asks for clarification when needed. After each cycle the loop continues until the task reaches a natural stopping point, the agent asks a question, or a limit is reached.">
  <defs>
    <style>
      .step-box { fill: #f5f4f2; stroke: #d6d2cd; stroke-width: 1.5; }
      .arrow { stroke: #302e2b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow--accent { stroke: #d35a20; stroke-width: 1.75; fill: none; marker-end: url(#arrowhead-accent); }
      .step-label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #302e2b; text-anchor: middle; }
      .step-sub { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #5a5856; text-anchor: middle; }
      .loop-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #b84d1a; font-style: italic; text-anchor: middle; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#302e2b"/>
    </marker>
    <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35a20"/>
    </marker>
  </defs>

  <!-- Step 1: Read -->
  <rect x="20" y="20" width="140" height="60" rx="6" class="step-box"/>
  <text x="90" y="48" class="step-label">Read</text>
  <text x="90" y="66" class="step-sub">files in scope</text>

  <!-- Step 2: Plan -->
  <rect x="180" y="20" width="140" height="60" rx="6" class="step-box"/>
  <text x="250" y="48" class="step-label">Plan</text>
  <text x="250" y="66" class="step-sub">next action</text>

  <!-- Step 3: Act -->
  <rect x="340" y="20" width="140" height="60" rx="6" class="step-box"/>
  <text x="410" y="48" class="step-label">Act</text>
  <text x="410" y="66" class="step-sub">edit or run a command</text>

  <!-- Step 4: Report -->
  <rect x="500" y="20" width="140" height="60" rx="6" class="step-box"/>
  <text x="570" y="48" class="step-label">Report</text>
  <text x="570" y="66" class="step-sub">activity stream</text>

  <!-- Step 5: Ask -->
  <rect x="660" y="20" width="140" height="60" rx="6" class="step-box"/>
  <text x="730" y="48" class="step-label">Ask</text>
  <text x="730" y="66" class="step-sub">wait for reply</text>

  <!-- Arrows between boxes -->
  <line x1="160" y1="50" x2="176" y2="50" class="arrow"/>
  <line x1="320" y1="50" x2="336" y2="50" class="arrow"/>
  <line x1="480" y1="50" x2="496" y2="50" class="arrow"/>
  <line x1="640" y1="50" x2="656" y2="50" class="arrow"/>

  <!-- Loop arrow from Ask back to Read (orange accent) -->
  <path d="M 730 80 C 730 170 130 170 130 95 L 130 80" class="arrow--accent"/>
  <text x="410" y="168" class="loop-label">continue until natural stop, question, or limit reached</text>
</svg>
