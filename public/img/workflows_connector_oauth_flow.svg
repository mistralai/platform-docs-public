<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-label="Connector OAuth flow sequence diagram. The client triggers a workflow on the worker. The worker's interceptor resolves connector slots and asks the Mistral API for an OAuth URL, which is forwarded to the client as an auth_url event. The user completes the OAuth flow in their browser. The worker polls the Mistral API until credentials are stored, then runs the workflow entrypoint and returns the result to the client.">
  <defs>
    <style>
      .lifeline { stroke: #d6d2cd; stroke-width: 1.25; stroke-dasharray: 4 4; }
      .header-card { fill: #f5f4f2; stroke: #d6d2cd; stroke-width: 1.5; }
      .arrow { stroke: #302e2b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow--dashed { stroke: #302e2b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 4 3; }
      .arrow--accent { stroke: #d35a20; stroke-width: 1.75; fill: none; marker-end: url(#arrowhead-accent); }
      .internal-box { fill: #ffffff; stroke: #d6d2cd; stroke-width: 1.25; }
      .note-box { fill: #fbf6f0; stroke: #e6c3a8; stroke-width: 1; }
      .header-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #302e2b; text-anchor: middle; }
      .msg-label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #302e2b; text-anchor: middle; }
      .msg-label--accent { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #b84d1a; font-weight: 600; text-anchor: middle; }
      .internal-label { font-family: Arial, Helvetica, sans-serif; font-size: 12.5px; fill: #5a5856; font-style: italic; text-anchor: middle; }
      .note-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #7a5230; font-style: italic; text-anchor: middle; }

      @media (prefers-color-scheme: dark) {
        .lifeline { stroke: #444; }
        .header-card { fill: #2d2d2d; stroke: #444; }
        .arrow { stroke: #f0f0f0; marker-end: url(#arrowhead-dark); }
        .arrow--dashed { stroke: #f0f0f0; marker-end: url(#arrowhead-dark); }
        .arrow--accent { stroke: #d35a20; marker-end: url(#arrowhead-accent); }
        .internal-box { fill: #2d2d2d; stroke: #444; }
        .note-box { fill: #332820; stroke: #7a5230; }
        .header-label { fill: #f0f0f0; }
        .msg-label { fill: #f0f0f0; }
        .msg-label--accent { fill: #e0631f; }
        .internal-label { fill: #d6d2cd; }
        .note-label { fill: #d6b08d; }
      }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#302e2b"/>
    </marker>
    <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35a20"/>
    </marker>
    <marker id="arrowhead-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0f0f0"/>
    </marker>
  </defs>

  <!-- Column x positions: Client=130, Worker=410, Mistral API=690 -->

  <!-- Headers -->
  <rect x="50" y="20" width="160" height="44" rx="6" class="header-card"/>
  <text x="130" y="48" class="header-label">Client</text>

  <rect x="330" y="20" width="160" height="44" rx="6" class="header-card"/>
  <text x="410" y="48" class="header-label">Worker</text>

  <rect x="610" y="20" width="160" height="44" rx="6" class="header-card"/>
  <text x="690" y="48" class="header-label">Mistral API</text>

  <!-- Lifelines -->
  <line x1="130" y1="64" x2="130" y2="494" class="lifeline"/>
  <line x1="410" y1="64" x2="410" y2="494" class="lifeline"/>
  <line x1="690" y1="64" x2="690" y2="494" class="lifeline"/>

  <!-- 1. Client -> Worker: start workflow -->
  <text x="267" y="92" class="msg-label">start workflow</text>
  <line x1="130" y1="100" x2="404" y2="100" class="arrow"/>

  <!-- 2. Internal box on Worker: interceptor resolves slots -->
  <rect x="332" y="118" width="156" height="30" rx="4" class="internal-box"/>
  <text x="410" y="138" class="internal-label">interceptor resolves slots</text>

  <!-- 3. Worker -> Mistral API: get auth URL -->
  <text x="550" y="172" class="msg-label">get auth URL</text>
  <line x1="416" y1="180" x2="684" y2="180" class="arrow"/>

  <!-- 4. Mistral API -> Worker: OAuth URL (accent) -->
  <text x="550" y="200" class="msg-label--accent">OAuth URL</text>
  <line x1="684" y1="208" x2="416" y2="208" class="arrow--accent"/>

  <!-- 5. Worker -> Client: auth_url event (accent) -->
  <text x="267" y="232" class="msg-label--accent">auth_url event</text>
  <line x1="404" y1="240" x2="136" y2="240" class="arrow--accent"/>

  <!-- Side note: user completes OAuth in browser -->
  <rect x="50" y="262" width="160" height="40" rx="4" class="note-box"/>
  <text x="130" y="279" class="note-label">user completes</text>
  <text x="130" y="293" class="note-label">OAuth in browser</text>

  <!-- 6. Worker -> Mistral API: poll credentials (dashed loop) -->
  <text x="550" y="332" class="msg-label">poll credentials</text>
  <line x1="416" y1="340" x2="684" y2="340" class="arrow--dashed"/>

  <!-- 7. Mistral API -> Worker: credentials found (accent) -->
  <text x="550" y="362" class="msg-label--accent">credentials found</text>
  <line x1="684" y1="370" x2="416" y2="370" class="arrow--accent"/>

  <!-- 8. Internal box on Worker: workflow entrypoint runs -->
  <rect x="332" y="394" width="156" height="30" rx="4" class="internal-box"/>
  <text x="410" y="414" class="internal-label">workflow entrypoint runs</text>

  <!-- 9. Worker -> Client: workflow result -->
  <text x="267" y="452" class="msg-label">workflow result</text>
  <line x1="404" y1="460" x2="136" y2="460" class="arrow"/>
</svg>
