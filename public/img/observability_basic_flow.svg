<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="110" viewBox="0 0 1600 110" role="img" aria-label="Observability flow: Explorer, Judge, Campaign, Dataset">
  <defs>
    <style>
      .node { stroke-width: 1.5; }
      .node--card { fill: #f5f4f2; stroke: #d6d2cd; }
      .node--accent { fill: #d35a20; stroke: #b84d1a; }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 26px;
        font-weight: 600;
        fill: #302e2b;
      }
      .label--accent { fill: #fff; }

      .sublabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
        fill: #7a7a7a;
      }
      .sublabel--accent { fill: rgba(255, 255, 255, 0.82); }

      .arrow {
        stroke: #b0aaa4;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrowHead { fill: #b0aaa4; }

      @media (prefers-color-scheme: dark) {
        .node--card { fill: #2d2d2d; stroke: #444; }
        .node--accent { fill: #d35a20; stroke: #e0631f; }
        .label { fill: #f0f0f0; }
        .sublabel { fill: #999; }
        .arrow { stroke: #666; }
        .arrowHead { fill: #666; }
      }
    </style>

    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" class="arrowHead"/>
    </marker>
  </defs>

  <!-- Layout: 4 nodes, 230x90, 60px gaps, y=10 -->
  <!-- x: 250, 540, 830, 1120 -->
  <!-- centers: 365, 655, 945, 1235 -->
  <!-- center-y = 55 -->

  <!-- 1. Explorer -->
  <rect class="node node--card" x="250" y="10" width="230" height="90" rx="14"/>
  <text class="label" x="365" y="51" text-anchor="middle">Explorer</text>
  <text class="sublabel" x="365" y="76" text-anchor="middle">Find conversations</text>

  <!-- Arrow 1 → 2 -->
  <path class="arrow" d="M 480 55 L 540 55" marker-end="url(#ah)"/>

  <!-- 2. Judge -->
  <rect class="node node--card" x="540" y="10" width="230" height="90" rx="14"/>
  <text class="label" x="655" y="51" text-anchor="middle">Judge</text>
  <text class="sublabel" x="655" y="76" text-anchor="middle">Score quality</text>

  <!-- Arrow 2 → 3 -->
  <path class="arrow" d="M 770 55 L 830 55" marker-end="url(#ah)"/>

  <!-- 3. Campaign -->
  <rect class="node node--card" x="830" y="10" width="230" height="90" rx="14"/>
  <text class="label" x="945" y="51" text-anchor="middle">Campaign</text>
  <text class="sublabel" x="945" y="76" text-anchor="middle">Annotate at scale</text>

  <!-- Arrow 3 → 4 -->
  <path class="arrow" d="M 1060 55 L 1120 55" marker-end="url(#ah)"/>

  <!-- 4. Dataset -->
  <rect class="node node--card" x="1120" y="10" width="230" height="90" rx="14"/>
  <text class="label" x="1235" y="51" text-anchor="middle">Dataset</text>
  <text class="sublabel" x="1235" y="76" text-anchor="middle">Save results</text>
</svg>