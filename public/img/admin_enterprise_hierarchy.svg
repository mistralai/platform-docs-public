<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Admin hierarchy: Enterprise Account links one or more Organizations, and each Organization contains one or more Workspaces.">
  <defs>
    <style>
      .panel { fill: #f5f4f2; stroke: #d6d2cd; stroke-width: 1.5; }
      .node { stroke-width: 1.5; }
      .node--card { fill: #ffffff; stroke: #d6d2cd; }
      .node--accent { fill: #d35a20; stroke: #b84d1a; }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 24px;
        font-weight: 600;
        fill: #302e2b;
      }
      .label--accent { fill: #fff; }

      .sublabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        fill: #7a7a7a;
      }
      .sublabel--accent { fill: rgba(255, 255, 255, 0.82); }

      .caption {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-style: italic;
        fill: #7a7a7a;
      }

      .arrow {
        stroke: #b0aaa4;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrowHead { fill: #b0aaa4; }

      @media (prefers-color-scheme: dark) {
        .panel { fill: #2d2d2d; stroke: #444; }
        .node--card { fill: #2d2d2d; stroke: #444; }
        .node--accent { fill: #d35a20; stroke: #e0631f; }
        .label { fill: #f0f0f0; }
        .sublabel { fill: #999; }
        .caption { fill: #999; }
        .arrow { stroke: #666; }
        .arrowHead { fill: #666; }
      }
    </style>

    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" class="arrowHead"/>
    </marker>
  </defs>

  <rect class="panel" x="40" y="30" width="1040" height="400" rx="18"/>

  <!-- Enterprise Account -->
  <rect class="node node--accent" x="420" y="60" width="280" height="84" rx="14"/>
  <text class="label label--accent" x="560" y="97" text-anchor="middle">Enterprise Account</text>
  <text class="sublabel sublabel--accent" x="560" y="122" text-anchor="middle">links Organizations</text>

  <!-- Organizations -->
  <rect class="node node--card" x="170" y="230" width="280" height="84" rx="14"/>
  <text class="label" x="310" y="267" text-anchor="middle">Organization #1</text>
  <text class="sublabel" x="310" y="292" text-anchor="middle">settings, members, billing</text>

  <rect class="node node--card" x="670" y="230" width="280" height="84" rx="14"/>
  <text class="label" x="810" y="267" text-anchor="middle">Organization #2</text>
  <text class="sublabel" x="810" y="292" text-anchor="middle">settings, members, billing</text>

  <!-- Workspace nodes -->
  <rect class="node node--card" x="215" y="350" width="190" height="44" rx="12"/>
  <text class="sublabel" x="310" y="378" text-anchor="middle">Workspace #1</text>

  <rect class="node node--card" x="715" y="350" width="190" height="44" rx="12"/>
  <text class="sublabel" x="810" y="378" text-anchor="middle">Workspace #2</text>

  <!-- Connections -->
  <path class="arrow" d="M 490 144 C 430 174 360 195 310 230" marker-end="url(#ah)"/>
  <path class="arrow" d="M 630 144 C 690 174 760 195 810 230" marker-end="url(#ah)"/>
  <path class="arrow" d="M 310 314 L 310 350" marker-end="url(#ah)"/>
  <path class="arrow" d="M 810 314 L 810 350" marker-end="url(#ah)"/>
</svg>
