<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="140" viewBox="0 0 1240 140" role="img" aria-label="Speech-to-speech pipeline: speech in flows to Voxtral Realtime, which transcribes it; an LLM reasons over the transcript and decides a response; Voxtral TTS speaks the reply as speech out.">
  <defs>
    <style>
      .node { stroke-width: 1.5; }
      .node--card { fill: #f5f4f2; stroke: #d6d2cd; }
      .node--accent { fill: #d35a20; stroke: #b84d1a; }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 24px;
        font-weight: 600;
        fill: #302e2b;
      }
      .label--accent { fill: #fff; }

      .sublabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #7a7a7a;
      }
      .sublabel--accent { fill: rgba(255, 255, 255, 0.82); }

      .endpoint {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 19px;
        font-weight: 600;
        fill: #7a7a7a;
      }

      .arrow {
        stroke: #b0aaa4;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrowHead { fill: #b0aaa4; }

      @media (prefers-color-scheme: dark) {
        .node--card { fill: #2d2d2d; stroke: #444; }
        .node--accent { fill: #d35a20; stroke: #e0631f; }
        .label { fill: #f0f0f0; }
        .sublabel { fill: #999; }
        .endpoint { fill: #999; }
        .arrow { stroke: #666; }
        .arrowHead { fill: #666; }
      }
    </style>

    <marker id="ah-pipeline" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" class="arrowHead"/>
    </marker>
  </defs>

  <!-- Layout: 3 nodes 260x90, y=25 (center 70), entry/exit endpoints -->

  <!-- Speech in -->
  <text class="endpoint" x="70" y="75" text-anchor="middle">Speech in</text>
  <path class="arrow" d="M 118 70 L 150 70" marker-end="url(#ah-pipeline)"/>

  <!-- 1. Voxtral Realtime -->
  <rect class="node node--card" x="150" y="25" width="260" height="90" rx="14"/>
  <text class="label" x="280" y="66" text-anchor="middle">Voxtral Realtime</text>
  <text class="sublabel" x="280" y="91" text-anchor="middle">Transcribe speech</text>

  <!-- Arrow 1 -> 2 -->
  <path class="arrow" d="M 410 70 L 480 70" marker-end="url(#ah-pipeline)"/>

  <!-- 2. LLM (accent) -->
  <rect class="node node--accent" x="480" y="25" width="260" height="90" rx="14"/>
  <text class="label label--accent" x="610" y="66" text-anchor="middle">LLM</text>
  <text class="sublabel sublabel--accent" x="610" y="91" text-anchor="middle">Reason over transcript</text>

  <!-- Arrow 2 -> 3 -->
  <path class="arrow" d="M 740 70 L 810 70" marker-end="url(#ah-pipeline)"/>

  <!-- 3. Voxtral TTS -->
  <rect class="node node--card" x="810" y="25" width="260" height="90" rx="14"/>
  <text class="label" x="940" y="66" text-anchor="middle">Voxtral TTS</text>
  <text class="sublabel" x="940" y="91" text-anchor="middle">Speak the reply</text>

  <!-- Speech out -->
  <path class="arrow" d="M 1070 70 L 1110 70" marker-end="url(#ah-pipeline)"/>
  <text class="endpoint" x="1170" y="75" text-anchor="middle">Speech out</text>
</svg>
