openapi: 3.1.0
info:
  title: Mistral AI API
  description: Our Chat Completion and Embeddings APIs specification. Create your account on [La Plateforme](https://console.mistral.ai) to get access and read the [docs](https://docs.mistral.ai) to learn how to use it.
  version: 1.0.0
paths:
  /v1/models:
    get:
      summary: List Models
      description: List all models available to the user.
      operationId: list_models_v1_models_get
      parameters:
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      - name: model
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
              examples:
                userExample:
                  value:
                  - id: <model_id>
                    capabilities:
                      completion_chat: true
                      completion_fim: false
                      function_calling: false
                      fine_tuning: false
                      vision: false
                      classification: false
                    job: <job_id>
                    root: open-mistral-7b
                    object: model
                    created: 1756746619
                    owned_by: <owner_id>
                    name: null
                    description: null
                    max_context_length: 32768
                    aliases: []
                    deprecation: null
                    deprecation_replacement_model: null
                    default_model_temperature: null
                    TYPE: fine-tuned
                    archived: false
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - models
  /v1/models/{model_id}:
    get:
      summary: Retrieve Model
      description: Retrieve information about a model.
      operationId: retrieve_model_v1_models__model_id__get
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          title: Model Id
        example: ft:open-mistral-7b:587a6b29:20240514:7e773925
        description: The ID of the model to retrieve.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BaseModelCard'
                - $ref: '#/components/schemas/FTModelCard'
                discriminator:
                  propertyName: type
                  mapping:
                    base: '#/components/schemas/BaseModelCard'
                    fine-tuned: '#/components/schemas/FTModelCard'
                title: Response Retrieve Model V1 Models  Model Id  Get
              examples:
                userExample:
                  value:
                    id: <your_model_id>
                    capabilities:
                      completion_chat: true
                      completion_fim: false
                      function_calling: false
                      fine_tuning: false
                      vision: false
                      classification: false
                    job: <job_id>
                    root: open-mistral-7b
                    object: model
                    created: 1756746619
                    owned_by: <owner_id>
                    name: null
                    description: null
                    max_context_length: 32768
                    aliases: []
                    deprecation: null
                    deprecation_replacement_model: null
                    default_model_temperature: null
                    TYPE: fine-tuned
                    archived: false
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - models
    delete:
      summary: Delete Model
      description: Delete a fine-tuned model.
      operationId: delete_model_v1_models__model_id__delete
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          title: Model Id
        example: ft:open-mistral-7b:587a6b29:20240514:7e773925
        description: The ID of the model to delete.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteModelOut'
              examples:
                userExample:
                  value:
                    id: ft:open-mistral-7b:587a6b29:20240514:7e773925
                    object: model
                    deleted: true
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - models
  /v1/conversations:
    post:
      operationId: agents_api_v1_conversations_start
      summary: Create a conversation and append entries to it.
      description: Create a new conversation, using a base model or an agent and append entries. Completion and tool executions are run and the response is appended to the conversation.Use the returned conversation_id to continue the conversation.
      tags:
      - beta.conversations
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      operationId: agents_api_v1_conversations_list
      summary: List all created conversations.
      description: Retrieve a list of conversation entities sorted by creation time.
      tags:
      - beta.conversations
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          title: Page
          default: 0
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          title: Page Size
          default: 100
      - name: metadata
        in: query
        required: false
        content:
          application/json:
            schema:
              anyOf:
              - type: object
                additionalProperties: true
              - type: 'null'
              title: Metadata
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                  - $ref: '#/components/schemas/ModelConversation'
                  - $ref: '#/components/schemas/AgentConversation'
                title: Response V1 Conversations List
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}:
    get:
      operationId: agents_api_v1_conversations_get
      summary: Retrieve a conversation information.
      description: Given a conversation_id retrieve a conversation entity with its attributes.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation from which we are fetching metadata.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation from which we are fetching metadata.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/ModelConversation'
                - $ref: '#/components/schemas/AgentConversation'
                title: Response V1 Conversations Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      operationId: agents_api_v1_conversations_delete
      summary: Delete a conversation.
      description: Delete a conversation given a conversation_id.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation from which we are fetching metadata.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation from which we are fetching metadata.
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      operationId: agents_api_v1_conversations_append
      summary: Append new entries to an existing conversation.
      description: Run completion on the history of the conversation and the user entries. Return the new created entries.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation to which we append entries.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation to which we append entries.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationAppendRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}/history:
    get:
      operationId: agents_api_v1_conversations_history
      summary: Retrieve all entries in a conversation.
      description: Given a conversation_id retrieve all the entries belonging to that conversation. The entries are sorted in the order they were appended, those can be messages, connectors or function_call.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation from which we are fetching entries.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation from which we are fetching entries.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationHistory'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}/messages:
    get:
      operationId: agents_api_v1_conversations_messages
      summary: Retrieve all messages in a conversation.
      description: Given a conversation_id retrieve all the messages belonging to that conversation. This is similar to retrieving all entries except we filter the messages only.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation from which we are fetching messages.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation from which we are fetching messages.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessages'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}/restart:
    post:
      operationId: agents_api_v1_conversations_restart
      summary: Restart a conversation starting from a given entry.
      description: Given a conversation_id and an id, recreate a conversation from this point and run completion. A new conversation is returned with the new entries returned.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the original conversation which is being restarted.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the original conversation which is being restarted.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRestartRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents:
    post:
      operationId: agents_api_v1_agents_create
      summary: Create a agent that can be used within a conversation.
      description: Create a new agent giving it instructions, tools, description. The agent is then available to be used as a regular assistant in a conversation or as part of an agent pool from which it can be used.
      tags:
      - beta.agents
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      operationId: agents_api_v1_agents_list
      summary: List agent entities.
      description: Retrieve a list of agent entities sorted by creation time.
      tags:
      - beta.agents
      parameters:
      - name: page
        in: query
        description: Page number (0-indexed)
        required: false
        schema:
          type: integer
          title: Page
          minimum: 0
          description: Page number (0-indexed)
          default: 0
      - name: page_size
        in: query
        description: Number of agents per page
        required: false
        schema:
          type: integer
          title: Page Size
          maximum: 1000
          minimum: 1
          description: Number of agents per page
          default: 20
      - name: deployment_chat
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Deployment Chat
      - name: sources
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/RequestSource'
          - type: 'null'
          title: Sources
      - name: name
        in: query
        description: Filter by agent name
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          description: Filter by agent name
      - name: search
        in: query
        description: Search agents by name or ID
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
          description: Search agents by name or ID
      - name: id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
      - name: metadata
        in: query
        required: false
        content:
          application/json:
            schema:
              anyOf:
              - type: object
                additionalProperties: true
              - type: 'null'
              title: Metadata
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
                title: Response V1 Agents List
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents/{agent_id}:
    get:
      operationId: agents_api_v1_agents_get
      summary: Retrieve an agent entity.
      description: Given an agent, retrieve an agent entity with its attributes. The agent_version parameter can be an integer version number or a string alias.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: agent_version
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: string
          - type: 'null'
          title: Agent Version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      operationId: agents_api_v1_agents_update
      summary: Update an agent entity.
      description: Update an agent attributes and create a new version.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      operationId: agents_api_v1_agents_delete
      summary: Delete an agent entity.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents/{agent_id}/version:
    patch:
      operationId: agents_api_v1_agents_update_version
      summary: Update an agent version.
      description: Switch the version of an agent.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: version
        in: query
        required: true
        schema:
          type: integer
          title: Version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents/{agent_id}/versions:
    get:
      operationId: agents_api_v1_agents_list_versions
      summary: List all versions of an agent.
      description: Retrieve all versions for a specific agent with full agent context. Supports pagination.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: page
        in: query
        description: Page number (0-indexed)
        required: false
        schema:
          type: integer
          title: Page
          minimum: 0
          description: Page number (0-indexed)
          default: 0
      - name: page_size
        in: query
        description: Number of versions per page
        required: false
        schema:
          type: integer
          title: Page Size
          maximum: 100
          minimum: 1
          description: Number of versions per page
          default: 20
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
                title: Response V1 Agents List Versions
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents/{agent_id}/versions/{version}:
    get:
      operationId: agents_api_v1_agents_get_version
      summary: Retrieve a specific version of an agent.
      description: Get a specific agent version by version number.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: version
        in: path
        required: true
        schema:
          type: string
          title: Version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/agents/{agent_id}/aliases:
    put:
      operationId: agents_api_v1_agents_create_or_update_alias
      summary: Create or update an agent version alias.
      description: Create a new alias or update an existing alias to point to a specific version. Aliases are unique per agent and can be reassigned to different versions.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: alias
        in: query
        required: true
        schema:
          type: string
          title: Alias
          maxLength: 64
          minLength: 1
          pattern: ^[a-z]([a-z0-9_-]*[a-z0-9])?$
      - name: version
        in: query
        required: true
        schema:
          type: integer
          title: Version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAliasResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      operationId: agents_api_v1_agents_list_version_aliases
      summary: List all aliases for an agent.
      description: Retrieve all version aliases for a specific agent.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentAliasResponse'
                title: Response V1 Agents List Version Aliases
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      operationId: agents_api_v1_agents_delete_alias
      summary: Delete an agent version alias.
      description: Delete an existing alias for an agent.
      tags:
      - beta.agents
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: alias
        in: query
        required: true
        schema:
          type: string
          title: Alias
          maxLength: 64
          minLength: 1
          pattern: ^[a-z]([a-z0-9_-]*[a-z0-9])?$
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations#stream:
    post:
      operationId: agents_api_v1_conversations_start_stream
      summary: Create a conversation and append entries to it.
      description: Create a new conversation, using a base model or an agent and append entries. Completion and tool executions are run and the response is appended to the conversation.Use the returned conversation_id to continue the conversation.
      tags:
      - beta.conversations
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationStreamRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConversationEvents'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}#stream:
    post:
      operationId: agents_api_v1_conversations_append_stream
      summary: Append new entries to an existing conversation.
      description: Run completion on the history of the conversation and the user entries. Return the new created entries.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the conversation to which we append entries.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the conversation to which we append entries.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationAppendStreamRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConversationEvents'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/conversations/{conversation_id}/restart#stream:
    post:
      operationId: agents_api_v1_conversations_restart_stream
      summary: Restart a conversation starting from a given entry.
      description: Given a conversation_id and an id, recreate a conversation from this point and run completion. A new conversation is returned with the new entries returned.
      tags:
      - beta.conversations
      parameters:
      - name: conversation_id
        in: path
        description: ID of the original conversation which is being restarted.
        required: true
        schema:
          type: string
          title: Conversation Id
          description: ID of the original conversation which is being restarted.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRestartStreamRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ConversationEvents'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/files:
    post:
      operationId: files_api_routes_upload_file
      summary: Upload File
      description: 'Upload a file that can be used across various endpoints.


        The size of individual files can be a maximum of 512 MB. The Fine-tuning API only supports .jsonl files.


