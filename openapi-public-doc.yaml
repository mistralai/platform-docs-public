      parameters:
        - name: workflow_name
          in: path
          required: true
          schema:
            type: string
            title: Workflow Name
        - name: start_time
          in: query
          description: Filter workflows started after this time (ISO 8601)
          required: false
          schema:
            anyOf:
              - type: string
                format: date-time
              - type: 'null'
            title: Start Time
            description: Filter workflows started after this time (ISO 8601)
        - name: end_time
          in: query
          description: Filter workflows started before this time (ISO 8601)
          required: false
          schema:
            anyOf:
              - type: string
                format: date-time
              - type: 'null'
            title: End Time
            description: Filter workflows started before this time (ISO 8601)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowMetrics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
