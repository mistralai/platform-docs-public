# Lychee link checker configuration
# Used by CI (.github/workflows/check-links.yml) to check external links in source files.
# Internal links are checked separately via `pnpm check-links` (local build + crawl).

# Exclude auto-generated API docs (generated from OpenAPI spec via Speakeasy)
exclude_path = ["src/app/(api)"]

# Domains and patterns to exclude from checking
exclude = [
  # Internal links — checked by `pnpm check-links` against the local build instead
  "^https://docs\\.mistral\\.ai",

  # Mistral services (require auth or are API endpoints)
  "^https://api\\.mistral\\.ai",
  "^https://admin\\.mistral\\.ai",
  "^https://console\\.mistral\\.ai",
  "^https://chat\\.mistral\\.ai",
  "^https://models\\.mistralcdn\\.com",
  "^https://v2\\.auth\\.mistral\\.ai",

  # Placeholder / example URLs
  "^https?://example\\.com",
  "^https?://your-",
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://\\{",
  "^https?://\\$",

  # Sites that rate-limit or block automated requests
  "^https://www\\.linkedin\\.com",
  "^https://colab\\.research\\.google\\.com",
  "^https://arxiv\\.org",
  "^https://picsum\\.photos",
  "^https://download\\.samplelib\\.com",
  "^https://x\\.com",
  "^https://twitter\\.com",

  # CDN / raw content (often 403s from CI)
  "^https://raw\\.githubusercontent\\.com",
]

# Accept these HTTP status codes as valid
accept = [200, 429]

# Timeout per request (seconds)
timeout = 30

# Max concurrent requests
max_concurrency = 5

# Max retries per request
max_retries = 3

# Retry wait time (seconds)
retry_wait_time = 5

# Don't check fragments/anchors on external URLs (too flaky)
include_fragments = false

# Don't check mail addresses
include_mail = false

# User agent (some sites block default bot UA)
user_agent = "Mozilla/5.0 (compatible; lychee-link-checker)"
