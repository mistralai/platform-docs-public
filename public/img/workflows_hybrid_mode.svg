<svg xmlns="http://www.w3.org/2000/svg" width="820" height="660" viewBox="0 0 820 660" role="img" aria-label="Hybrid mode architecture: your environment runs your code and workers, while the Studio environment hosts the Mistral Workflows API and orchestrator">
  <defs>
    <style>
      .node { stroke-width: 1.5; }
      .node--card { fill: #f5f4f2; stroke: #d6d2cd; }
      .node--inner { fill: #ffffff; stroke: #d6d2cd; }
      .node--accent { fill: #d35a20; stroke: #b84d1a; }
      .container { fill: #fafaf8; stroke: #d6d2cd; stroke-dasharray: 6 4; stroke-width: 1.5; }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #302e2b;
      }
      .label--accent { fill: #ffffff; }
      .sublabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        fill: #7a7a7a;
      }
      .sublabel--accent { fill: rgba(255, 255, 255, 0.85); }
      .caption {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        fill: #7a7a7a;
        font-style: italic;
      }
      .zone-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #7a7a7a;
        letter-spacing: 0.12em;
      }
      .border-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: #7a7a7a;
        font-style: italic;
        letter-spacing: 0.04em;
      }

      .arrow {
        stroke: #b0aaa4;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrowHead { fill: #b0aaa4; }

      @media (prefers-color-scheme: dark) {
        .node--card { fill: #2d2d2d; stroke: #444; }
        .node--inner { fill: #1f1f1f; stroke: #444; }
        .node--accent { fill: #d35a20; stroke: #e0631f; }
        .container { fill: #232323; stroke: #444; }
        .label { fill: #f0f0f0; }
        .sublabel { fill: #999; }
        .caption { fill: #999; }
        .zone-label { fill: #999; }
        .border-label { fill: #999; }
        .arrow { stroke: #666; }
        .arrowHead { fill: #666; }
      }
    </style>

    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" class="arrowHead"/>
    </marker>
  </defs>

  <!-- Your environment container -->
  <rect class="container" x="30" y="20" width="760" height="240" rx="16"/>
  <text class="zone-label" x="50" y="44">YOUR ENVIRONMENT</text>

  <!-- Your code card -->
  <rect class="node node--inner" x="80" y="70" width="280" height="140" rx="10"/>
  <text class="label" x="220" y="115" text-anchor="middle">Your code</text>
  <text class="sublabel" x="220" y="145" text-anchor="middle">workflow code + activity code</text>
  <text class="sublabel" x="220" y="167" text-anchor="middle">(in your repo)</text>

  <!-- Local development card -->
  <rect class="node node--inner" x="460" y="70" width="280" height="140" rx="10"/>
  <text class="label" x="600" y="115" text-anchor="middle">Local development</text>
  <text class="sublabel" x="600" y="145" text-anchor="middle">your laptop,</text>
  <text class="sublabel" x="600" y="167" text-anchor="middle">running workers</text>

  <!-- Bidirectional arrow between cards -->
  <path class="arrow" d="M 367 140 L 453 140" marker-start="url(#ah)" marker-end="url(#ah)"/>

  <!-- Caption "workers run here" -->
  <text class="caption" x="410" y="240" text-anchor="middle">workers run here</text>

  <!-- Down arrows from cards to API -->
  <path class="arrow" d="M 220 210 L 220 355" marker-end="url(#ah)"/>
  <path class="arrow" d="M 600 210 L 600 355" marker-end="url(#ah)"/>

  <!-- API + UI border label -->
  <text class="border-label" x="410" y="296" text-anchor="middle">— API + UI (border) —</text>

  <!-- Studio environment container -->
  <rect class="container" x="30" y="320" width="760" height="300" rx="16"/>

  <!-- Mistral Workflows API box (accent) -->
  <rect class="node node--accent" x="80" y="365" width="660" height="80" rx="12"/>
  <text class="label label--accent" x="410" y="397" text-anchor="middle">Mistral Workflows API</text>
  <text class="sublabel sublabel--accent" x="410" y="422" text-anchor="middle">REST + streaming + Studio UI</text>

  <!-- Arrow API → Orchestrator -->
  <path class="arrow" d="M 410 450 L 410 495" marker-end="url(#ah)"/>

  <!-- Orchestrator box -->
  <rect class="node node--card" x="80" y="505" width="660" height="80" rx="12"/>
  <text class="label" x="410" y="537" text-anchor="middle">Orchestrator</text>
  <text class="sublabel" x="410" y="562" text-anchor="middle">state · history · task dispatch · scheduling</text>

  <!-- Studio environment label (bottom) -->
  <text class="zone-label" x="410" y="608" text-anchor="middle">STUDIO ENVIRONMENT</text>
</svg>
