components:
  schemas:
    BaseModelCard:
      properties:
        id:
          type: string
          title: Id
        object:
          type: string
          title: Object
          default: model
        created:
          type: integer
          title: Created
        owned_by:
          type: string
          title: Owned By
          default: mistralai
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        max_context_length:
          type: integer
          title: Max Context Length
          default: 32768
        aliases:
          items:
            type: string
          type: array
          title: Aliases
          default: []
        deprecation:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Deprecation
        deprecation_replacement_model:
          anyOf:
            - type: string
            - type: 'null'
          title: Deprecation Replacement Model
        default_model_temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Default Model Temperature
        type:
          type: string
          const: base
          title: Type
          default: base
      type: object
      required:
        - id
        - capabilities
      title: BaseModelCard
    FTModelCard:
      properties:
        id:
          type: string
          title: Id
        object:
          type: string
          title: Object
          default: model
        created:
          type: integer
          title: Created
        owned_by:
          type: string
          title: Owned By
          default: mistralai
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        max_context_length:
          type: integer
          title: Max Context Length
          default: 32768
        aliases:
          items:
            type: string
          type: array
          title: Aliases
          default: []
        deprecation:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Deprecation
        deprecation_replacement_model:
          anyOf:
            - type: string
            - type: 'null'
          title: Deprecation Replacement Model
        default_model_temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Default Model Temperature
        type:
          type: string
          const: fine-tuned
          title: Type
          default: fine-tuned
        job:
          type: string
          title: Job
        root:
          type: string
          title: Root
        archived:
          type: boolean
          title: Archived
          default: false
      type: object
      required:
        - id
        - capabilities
        - job
        - root
      title: FTModelCard
      description: Extra fields for fine-tuned models.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MetadataDict:
      properties: {}
      additionalProperties: true
      type: object
      title: MetadataDict
      description: Custom type for metadata with embedded validation.
    ModelCapabilities:
      properties:
        completion_chat:
          type: boolean
          title: Completion Chat
          default: false
        function_calling:
          type: boolean
          title: Function Calling
          default: false
        reasoning:
          type: boolean
          title: Reasoning
          default: false
        completion_fim:
          type: boolean
          title: Completion Fim
          default: false
        fine_tuning:
          type: boolean
          title: Fine Tuning
          default: false
        vision:
          type: boolean
          title: Vision
          default: false
        ocr:
          type: boolean
          title: Ocr
          default: false
        classification:
          type: boolean
          title: Classification
          default: false
        moderation:
          type: boolean
          title: Moderation
          default: false
        audio:
          type: boolean
          title: Audio
          default: false
        audio_transcription:
          type: boolean
          title: Audio Transcription
          default: false
        audio_transcription_realtime:
          type: boolean
          title: Audio Transcription Realtime
          default: false
        audio_speech:
          type: boolean
          title: Audio Speech
          default: false
      type: object
      title: ModelCapabilities
      description: 'This is populated by Harmattan, but some fields have a name

        that we don''t want to expose in the API.'
    ModelList:
      properties:
        object:
          type: string
          title: Object
          default: list
        data:
          items:
            oneOf:
              - $ref: '#/components/schemas/BaseModelCard'
              - $ref: '#/components/schemas/FTModelCard'
            discriminator:
              propertyName: type
              mapping:
                base: '#/components/schemas/BaseModelCard'
                fine-tuned: '#/components/schemas/FTModelCard'
          type: array
          title: Data
      type: object
      title: ModelList
    SpeechOutputFormat:
      type: string
      enum:
        - pcm
        - wav
        - mp3
        - flac
        - opus
      title: SpeechOutputFormat
    SpeechRequest:
      properties:
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
        metadata:
          anyOf:
            - $ref: '#/components/schemas/MetadataDict'
            - type: 'null'
        stream:
          type: boolean
          title: Stream
          default: false
        voice_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Voice Id
          description: The preset or custom voice to use for generating the speech.
        ref_audio:
          anyOf:
            - type: string
            - type: string
              contentMediaType: application/octet-stream
            - type: 'null'
          title: Ref Audio
          description: The audio reference for generating the speech.
        input:
          type: string
          title: Input
          description: Text to generate a speech from
        response_format:
          $ref: '#/components/schemas/SpeechOutputFormat'
          description: Output audio format. Defaults to mp3.
          default: mp3
      additionalProperties: true
      type: object
      required:
        - input
      title: SpeechRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
